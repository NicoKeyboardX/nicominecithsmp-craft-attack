<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicominecith SMP | Teilnehmerliste</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Orbitron:wght@900&display=swap');

        :root {
            --red: #ff0000;
            --red-glow: rgba(255, 0, 0, 0.6);
            --black: #020202;
            --gray-dark: #0a0a0a;
            --gray-mid: #151515;
            --white: #ffffff;
            --maybe-blue: #7000ff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--black);
            color: var(--white);
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Dynamischer Hintergrund */
        .bg-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a0505 0%, #020202 100%);
        }

        .particle {
            position: absolute;
            background: var(--red);
            border-radius: 50%;
            opacity: 0.3;
            filter: blur(2px);
            animation: move-particles 15s infinite linear;
        }

        @keyframes move-particles {
            0% { transform: translateY(110vh) translateX(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-10vh) translateX(50px); opacity: 0; }
        }

        /* Logo & Header */
        .hero {
            padding: 60px 20px 20px;
            text-align: center;
            position: relative;
        }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--red);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: 5px;
            text-shadow: 0 0 10px var(--red-glow);
        }

        /* Filter Buttons */
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--gray-dark);
            border: 1px solid var(--gray-mid);
            color: #777;
            padding: 8px 20px;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active {
            border-color: var(--red);
            color: var(--white);
            background: rgba(255, 0, 0, 0.1);
        }

        .filter-btn:hover:not(.active) {
            border-color: #444;
            color: #bbb;
        }

        /* Tabelle Styling */
        .table-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 60px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        th {
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: #555;
            padding: 15px;
            text-align: left;
            font-weight: 900;
        }

        tr.player-row {
            background: var(--gray-dark);
            transition: all 0.3s ease;
        }

        tr.player-row:hover {
            background: var(--gray-mid);
            transform: scale(1.005);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.1);
        }

        td {
            padding: 12px 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        td:first-child {
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px 0 0 4px;
        }

        td:last-child {
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0 4px 4px 0;
        }

        .skin-head-small {
            width: 32px;
            height: 32px;
            image-rendering: pixelated;
            border-radius: 2px;
        }

        /* Status Badge */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            font-size: 0.65rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.05);
        }

        .badge-red {
            color: var(--red);
            border: 1px solid rgba(255, 0, 0, 0.3);
        }

        .badge-member {
            color: #00ccff;
            border: 1px solid rgba(0, 204, 255, 0.3);
        }

        .badge-maybe {
            color: var(--maybe-blue);
            border: 1px solid rgba(112, 0, 255, 0.4);
            text-shadow: 0 0 5px rgba(112, 0, 255, 0.2);
        }

        /* Search Bar */
        .search-container {
            max-width: 1000px;
            margin: 10px auto 20px;
            padding: 0 20px;
            position: relative;
        }

        .search-bar {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            color: white;
            padding: 15px 25px;
            font-size: 1rem;
            font-weight: 700;
            outline: none;
            transition: all 0.3s;
        }

        .search-bar:focus {
            border-color: var(--red);
        }

        .twitch-link {
            color: #6441a5;
            transition: color 0.2s;
        }

        .twitch-link:hover {
            color: #9146ff;
        }

        footer {
            padding: 40px 20px;
            text-align: center;
            color: #333;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

    </style>
</head>
<body>

    <div class="bg-wrapper" id="particleContainer"></div>

    <header class="hero">
        <h1 class="main-title">Nicominecith <span class="text-zinc-600">SMP</span></h1>
        <div class="subtitle">Teilnehmer-Liste</div>
        
        <div class="flex justify-center gap-4 mt-8">
            <a href="https://discord.gg/mBKjReQXHR" target="_blank" class="px-6 py-2 bg-white text-black font-black uppercase text-[10px] tracking-widest hover:bg-red-600 hover:text-white transition-colors">
                Discord
            </a>
        </div>
    </header>

    <div class="search-container">
        <div class="filter-container">
            <button class="filter-btn active" onclick="setCategory('all')">Alle</button>
            <button class="filter-btn" onclick="setCategory('streamer')">Streamer</button>
            <button class="filter-btn" onclick="setCategory('member')">Member</button>
        </div>
        <input type="text" id="searchInput" class="search-bar" placeholder="SPIELER SUCHEN...">
    </div>

    <main class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">Avatar</th>
                    <th>Name</th>
                    <th>Rolle / Status</th>
                    <th style="width: 100px; text-align: right;">Socials</th>
                </tr>
            </thead>
            <tbody id="playerTableBody">
                <!-- Dynamisch -->
            </tbody>
        </table>
    </main>

    <footer>
        Nicominecith SMP &copy; 2026
    </footer>

    <script>
        // Partikel Erzeugung
        const container = document.getElementById('particleContainer');
        for(let i=0; i<30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 3 + 1;
            p.style.width = p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDelay = Math.random() * 10 + 's';
            p.style.animationDuration = (Math.random() * 10 + 10) + 's';
            container.appendChild(p);
        }

        // Teilnehmer-Datenbank
        const participants = [
            { name: "Nicominecith", type: "Projektleiter", twitch: "nicominecith_ttv", category: "streamer" },
            { name: "jaime_zockt", type: "Creator", twitch: "jaime_zockt", category: "streamer" },
            { name: "jeypiegc", type: "Creator", twitch: "jeypiegc", category: "streamer" },
            { name: "BenX_LP", type: "Member", category: "member" },
            { name: "Benneno235", type: "zu 99% am Release nicht da", category: "member" },
            { name: "XJonTendoX", type: "Creator", twitch: "XJonTendoX", category: "streamer" },
            { name: "sebikaacat", type: "Creator", twitch: "sebikaacat", category: "streamer" },
            { name: "der_fynn10", type: "Creator", twitch: "der_fynn10", category: "streamer" },
            { name: "hektor_422", type: "Creator", twitch: "hektor_422", category: "streamer" },
            { name: "RZ Lian", type: "Member", category: "member" },
            { name: "Optimalst0rm", type: "vielleicht dabei", category: "member" },
            { name: "Elias", type: "Member", category: "member" },
            { name: "davidgamingtv", type: "vielleicht dabei", twitch: "davidgamingtv", category: "streamer" },
            { name: "monkey_3420", type: "Member", category: "member" },
            { name: "palyoug", type: "Creator", twitch: "palyoug", category: "streamer" },
            { name: "niebuco", type: "Creator", twitch: "niebuco", category: "streamer" },
            { name: "Beacon", type: "Member", category: "member" },
            { name: "fnkamikaze", type: "Creator", twitch: "fnkamikaze", category: "streamer" },
            { name: "n1ghtdreams_", type: "Creator", twitch: "n1ghtdreams_", category: "streamer" },
            { name: "whithhd", type: "Creator", twitch: "whithhd", category: "streamer" },
            { name: "blaqqhd", type: "Creator", twitch: "blaqqhd", category: "streamer" },
            { name: "Alessio332", mc: "Ale2k", type: "Member", category: "member" },
            { name: "BrotSpokyy", mc: "BrotSpokyy", type: "Creator", twitch: "BrotSpokyy", category: "streamer" },
            { name: "gemer703", type: "vielleicht dabei", category: "member" }
        ];

        let currentCategory = 'all';
        const tableBody = document.getElementById('playerTableBody');
        const searchInput = document.getElementById('searchInput');

        function setCategory(cat) {
            currentCategory = cat;
            
            // UI Update Buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase() === cat || (cat === 'all' && btn.innerText === 'Alle')) {
                    btn.classList.add('active');
                }
            });

            render(searchInput.value);
        }

        function render(filter = '') {
            tableBody.innerHTML = '';
            
            const filtered = participants.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(filter.toLowerCase());
                const matchesCategory = currentCategory === 'all' || p.category === currentCategory;
                return matchesSearch && matchesCategory;
            });

            filtered.forEach(p => {
                const skinIdentifier = p.mc || p.name.split(' ')[0];
                const avatarUrl = `https://cravatar.eu/head/${skinIdentifier}/64.png?overlay`;
                
                const row = document.createElement('tr');
                row.className = 'player-row';
                
                // Bestimme Badge Klasse
                let badgeClass = 'badge-member';
                if (p.type === 'vielleicht dabei') {
                    badgeClass = 'badge-maybe';
                } else if(p.type === 'Projektleiter' || p.type.includes('99%')) {
                    badgeClass = 'badge-red';
                } else if(p.category === 'streamer') {
                    badgeClass = 'badge-red';
                }

                row.innerHTML = `
                    <td>
                        <img src="${avatarUrl}" class="skin-head-small" alt="Skin" onerror="this.src='https://cravatar.eu/head/char/64.png'">
                    </td>
                    <td>
                        <span class="font-bold uppercase text-sm tracking-tight">${p.name}</span>
                    </td>
                    <td>
                        <span class="badge ${badgeClass}">${p.type}</span>
                    </td>
                    <td style="text-align: right;">
                        ${p.twitch ? `
                            <a href="https://twitch.tv/${p.twitch}" target="_blank" class="twitch-link" title="Twitch Profil">
                                <i class="fab fa-twitch"></i>
                            </a>
                        ` : '<span class="text-zinc-800">-</span>'}
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        searchInput.addEventListener('input', (e) => render(e.target.value));
        window.onload = () => render();
    </script>
</body>
</html>
