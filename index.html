<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nicominecith SMP | Teilnehmer & Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Orbitron:wght@900&display=swap');

        :root {
            --red: #ff0000;
            --red-glow: rgba(255, 0, 0, 0.6);
            --black: #020202;
            --gray-dark: #0a0a0a;
            --gray-mid: #151515;
            --white: #ffffff;
            --maybe-blue: #7000ff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--black);
            color: var(--white);
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
        }

        .bg-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a0505 0%, #020202 100%);
        }

        .particle {
            position: absolute;
            background: var(--red);
            border-radius: 50%;
            opacity: 0.3;
            filter: blur(2px);
            animation: move-particles 15s infinite linear;
        }

        @keyframes move-particles {
            0% { transform: translateY(110vh) translateX(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-10vh) translateX(50px); opacity: 0; }
        }

        /* Language Switcher Styles */
        .lang-switcher {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }

        .lang-btn {
            background: var(--gray-dark);
            border: 1px solid var(--gray-mid);
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.6;
        }

        .lang-btn.active {
            opacity: 1;
            border-color: var(--red);
            box-shadow: 0 0 10px var(--red-glow);
        }

        .hero {
            padding: 60px 15px 20px;
            text-align: center;
            position: relative;
        }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.5rem, 8vw, 3.5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--red);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 8px;
            text-shadow: 0 0 10px var(--red-glow);
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 25px auto;
            max-width: 800px;
            flex-wrap: wrap;
            padding: 0 10px;
        }

        .stat-card {
            background: var(--gray-dark);
            border: 1px solid var(--gray-mid);
            padding: 12px 15px;
            text-align: center;
            flex: 1;
            min-width: 140px;
            border-bottom: 2px solid var(--red);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-value {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.1rem, 4vw, 1.5rem);
            color: var(--white);
            font-weight: 900;
        }

        .stat-label {
            display: block;
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #555;
            margin-top: 4px;
        }

        .date-label {
            font-size: 0.6rem;
            color: var(--red);
            font-weight: 900;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .filter-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            padding: 0 10px;
        }

        .filter-btn {
            background: var(--gray-dark);
            border: 1px solid var(--gray-mid);
            color: #777;
            padding: 10px 15px;
            font-size: 0.65rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 80px;
            max-width: 120px;
        }

        .filter-btn.active {
            border-color: var(--red);
            color: var(--white);
            background: rgba(255, 0, 0, 0.1);
        }

        .search-controls {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .sort-btn {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            color: var(--red);
            padding: 0 20px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .sort-btn:hover {
            border-color: var(--red);
            background: rgba(255,0,0,0.05);
        }

        .table-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 15px 40px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 6px;
        }

        th {
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 1.5px;
            color: #555;
            padding: 10px;
            text-align: left;
            font-weight: 900;
        }

        tr.player-row {
            background: var(--gray-dark);
            transition: transform 0.2s ease;
        }

        tr.player-row:hover {
            transform: scale(1.01);
            background: #0f0f0f;
        }

        td {
            padding: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .skin-head-small {
            width: 42px;
            height: 42px;
            image-rendering: pixelated;
            border-radius: 4px;
            cursor: pointer;
            background-color: #111;
            border: 1px solid #222;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            font-size: 0.6rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 2px;
            white-space: nowrap;
        }

        .badge-red { color: var(--red); border: 1px solid rgba(255, 0, 0, 0.3); background: rgba(255, 0, 0, 0.05); }
        .badge-member { color: #00ccff; border: 1px solid rgba(0, 204, 255, 0.3); background: rgba(0, 204, 255, 0.05); }
        .badge-maybe { color: var(--maybe-blue); border: 1px solid rgba(112, 0, 255, 0.4); background: rgba(112, 0, 255, 0.05); }

        .search-container {
            max-width: 1000px;
            margin: 10px auto 15px;
            padding: 0 15px;
        }

        .search-bar {
            flex-grow: 1;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            color: white;
            padding: 12px 20px;
            font-size: 0.9rem;
            font-weight: 700;
            outline: none;
            border-radius: 4px;
        }

        .search-bar:focus { border-color: var(--red); }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            padding: 20px;
        }

        .modal-content {
            background: var(--gray-dark);
            border: 1px solid var(--red);
            padding: 30px 20px;
            text-align: center;
            position: relative;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
        }

        .rules-text {
            text-align: left;
            font-family: 'Inter', monospace;
            font-size: 0.75rem;
            line-height: 1.5;
            color: #bbb;
            white-space: pre-wrap;
            border-left: 2px solid var(--red);
            padding-left: 15px;
            margin-bottom: 20px;
        }

        .full-skin-img {
            max-height: 50vh;
            image-rendering: pixelated;
            margin: 0 auto;
        }

        .close-modal {
            position: absolute;
            top: 10px;
            right: 15px;
            color: white;
            font-size: 28px;
            cursor: pointer;
            padding: 5px;
            z-index: 10;
        }

        footer {
            padding: 40px 20px;
            text-align: center;
            color: #444;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-top: 1px solid #111;
        }

        @media (max-width: 480px) {
            th:nth-child(3), td:nth-child(3) { display: none; }
            .stat-card { min-width: 45%; }
            .filter-btn { min-width: 30%; }
            .search-controls { flex-direction: column; }
            .sort-btn { padding: 12px; justify-content: center; }
            .lang-switcher { top: 10px; right: 10px; }
        }
    </style>
</head>

        ];

        let currentCategory = 'all';
        let sortOrder = 'az'; // 'default', 'az', 'za'
        const tableBody = document.getElementById('playerTableBody');
        const searchInput = document.getElementById('searchInput');
        const memberCountDisplay = document.getElementById('memberCount');

        // --- CORE FUNCTIONS ---

        function changeLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${lang}`).classList.add('active');

            // Translate static elements
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerHTML = translations[lang][key];
            });

            // Translate placeholders
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                el.placeholder = translations[lang][key];
            });

            // Update Sort Label based on state
            const sortLabel = document.getElementById('sortLabel');
            if (sortOrder === 'az') sortLabel.innerText = translations[lang].sort_az;
            else if (sortOrder === 'za') sortLabel.innerText = translations[lang].sort_za;
            else sortLabel.innerText = translations[lang].sort_rank;

            // Update rules
            document.getElementById('rulesContent').innerText = translations[lang].rules_text;

            render(searchInput.value);
        }

        // Particles background
        const container = document.getElementById('particleContainer');
        const particleCount = window.innerWidth < 600 ? 15 : 30;
        for(let i=0; i<particleCount; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 3 + 1;
            p.style.width = p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDelay = Math.random() * 10 + 's';
            p.style.animationDuration = (Math.random() * 10 + 10) + 's';
            container.appendChild(p);
        }

        // Timer Logic
        function updateCountdown() {
            const targetDate = new Date("April 1, 2026 19:00:00").getTime();
            const now = new Date().getTime();
            const diff = targetDate - now;
            if (diff <= 0) {
                document.getElementById('countdownTimer').innerText = translations[currentLang].live;
                return;
            }
            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('countdownTimer').innerText = 
                `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // Modals
        function openRulesModal() { document.getElementById('rulesModal').style.display = 'flex'; document.body.style.overflow = 'hidden'; }
        function openMapModal() { document.getElementById('mapModal').style.display = 'flex'; document.body.style.overflow = 'hidden'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; document.body.style.overflow = 'auto'; }
        function openSkinModal(name, mcName) {
            const modal = document.getElementById('skinModal');
            document.getElementById('modalPlayerName').innerText = name;
            document.getElementById('fullSkinImg').src = `https://mc-heads.net/body/${mcName || name}/400`;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const btnAction = btn.getAttribute('onclick');
                btn.classList.toggle('active', btnAction.includes(`'${cat}'`));
            });
            render(searchInput.value);
        }

        function toggleSort() {
            const label = document.getElementById('sortLabel');
            const icon = document.querySelector('#sortBtn i');
            
            if (sortOrder === 'default') {
                sortOrder = 'az';
                label.innerText = translations[currentLang].sort_az;
                icon.className = 'fas fa-sort-alpha-down';
            } else if (sortOrder === 'az') {
                sortOrder = 'za';
                label.innerText = translations[currentLang].sort_za;
                icon.className = 'fas fa-sort-alpha-up';
            } else {
                sortOrder = 'default';
                label.innerText = translations[currentLang].sort_rank;
                icon.className = 'fas fa-crown';
            }
            render(searchInput.value);
        }

        function render(filterText = '') {
            tableBody.innerHTML = '';
            
            let filtered = participants.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(filterText.toLowerCase());
                const matchesCategory = currentCategory === 'all' || p.category === currentCategory;
                return matchesSearch && matchesCategory;
            });

            if (sortOrder === 'az') {
                filtered.sort((a, b) => a.name.localeCompare(b.name));
            } else if (sortOrder === 'za') {
                filtered.sort((a, b) => b.name.localeCompare(a.name));
            } else {
                filtered.sort((a, b) => a.rank - b.rank);
            }

            memberCountDisplay.innerText = participants.length;

            filtered.forEach(p => {
                const skinIdentifier = p.mc || p.name;
                const row = document.createElement('tr');
                row.className = 'player-row';
                
                let badgeClass = 'badge-member';
                const typeText = p.type[currentLang];
                const lowerType = typeText.toLowerCase();

                if (lowerType.includes('vielleicht') || lowerType.includes('maybe') || lowerType.includes('nicht') || lowerType.includes('absent')) {
                    badgeClass = 'badge-maybe';
                } else if(p.category === 'streamer' || p.rank === 1) {
                    badgeClass = 'badge-red';
                }

                row.innerHTML = `
                    <td>
                        <img src="https://mc-heads.net/avatar/${skinIdentifier}/64" 
                             class="skin-head-small" 
                             onclick="openSkinModal('${p.name}', '${p.mc || ''}')"
                             onerror="this.src='https://mc-heads.net/avatar/Steve/64'">
                    </td>
                    <td>
                        <div class="flex flex-col">
                            <span class="font-bold uppercase text-[12px] sm:text-sm tracking-tight">${p.name}</span>
                            <span class="sm:hidden mt-1"><span class="badge ${badgeClass}">${typeText}</span></span>
                        </div>
                    </td>
                    <td class="hidden sm:table-cell">
                        <span class="badge ${badgeClass}">${typeText}</span>
                    </td>
                    <td style="text-align: right; padding-right: 15px;">
                        ${p.twitch ? `
                            <a href="https://twitch.tv/${p.twitch}" target="_blank" class="text-[#9146ff] text-xl transition-transform hover:scale-125 inline-block p-2">
                                <i class="fab fa-twitch"></i>
                            </a>
                        ` : '<span class="text-zinc-800">-</span>'}
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        searchInput.addEventListener('input', (e) => render(e.target.value));
        
        window.onload = () => {
            changeLanguage('de'); // Start with German
        };
    </script>
