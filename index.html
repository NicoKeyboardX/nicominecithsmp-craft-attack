<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicominecith SMP | Craft Attack Projekt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Orbitron:wght@900&display=swap');

        :root {
            --red: #ff0000;
            --red-glow: rgba(255, 0, 0, 0.6);
            --black: #020202;
            --gray-dark: #0a0a0a;
            --gray-mid: #151515;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--black);
            color: var(--white);
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Dynamischer Hintergrund */
        .bg-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a0505 0%, #020202 100%);
        }

        .particle {
            position: absolute;
            background: var(--red);
            border-radius: 50%;
            opacity: 0.3;
            filter: blur(2px);
            animation: move-particles 15s infinite linear;
        }

        @keyframes move-particles {
            0% { transform: translateY(110vh) translateX(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-10vh) translateX(50px); opacity: 0; }
        }

        /* Logo & Header */
        .hero {
            padding: 120px 20px 60px;
            text-align: center;
            position: relative;
        }

        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 30px;
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            background: var(--red);
            filter: blur(60px);
            opacity: 0.4;
            border-radius: 50%;
            z-index: 0;
            animation: pulse-glow 4s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.5; }
        }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 0.85;
            position: relative;
            z-index: 1;
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.8rem);
            color: var(--red);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: 10px;
            text-shadow: 0 0 15px var(--red-glow);
        }

        /* Buttons */
        .btn {
            padding: 18px 40px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
        }

        .btn-discord {
            background: var(--white);
            color: var(--black);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }

        .btn-discord:hover {
            background: var(--red);
            color: var(--white);
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--red-glow);
        }

        .btn-outline {
            border-color: rgba(255, 255, 255, 0.1);
            color: var(--white);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }

        .btn-outline:hover {
            border-color: var(--white);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Card Design */
        .card-grid {
            max-width: 1300px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .player-card {
            background: var(--gray-dark);
            border: 1px solid var(--gray-mid);
            padding: 40px 20px;
            position: relative;
            transition: all 0.4s ease;
            text-align: center;
        }

        .player-card::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 0%; height: 3px;
            background: var(--red);
            transition: width 0.4s ease;
        }

        .player-card:hover {
            background: #0f0f0f;
            transform: translateY(-10px);
            border-color: #333;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .player-card:hover::after {
            width: 100%;
        }

        .skin-head {
            width: 100px;
            height: 100px;
            image-rendering: pixelated;
            margin: 0 auto 20px;
            transition: transform 0.4s ease;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
        }

        .player-card:hover .skin-head {
            transform: scale(1.25) rotate(-3deg);
        }

        /* Search Bar */
        .search-container {
            max-width: 600px;
            margin: 40px auto;
            position: relative;
        }

        .search-bar {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            color: white;
            padding: 20px 30px;
            font-size: 1.1rem;
            font-weight: 700;
            outline: none;
            transition: all 0.3s;
        }

        .search-bar:focus {
            border-color: var(--red);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.1);
        }

        footer {
            padding: 80px 20px;
            text-align: center;
            border-top: 1px solid var(--gray-mid);
            color: #444;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.75rem;
        }

    </style>
</head>
<body>

    <div class="bg-wrapper" id="particleContainer"></div>

    <header class="hero">
        <div class="logo-container">
            <div class="logo-glow"></div>
            <h1 class="main-title">Nicominecith <span class="text-zinc-500">SMP</span></h1>
            <div class="subtitle">Craft Attack Projekt</div>
        </div>

        <div class="max-w-2xl mx-auto mt-6 px-4">
            <div class="flex items-center justify-center space-x-4 mb-8">
                <span class="h-[1px] w-12 bg-zinc-800"></span>
                <span class="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.4em]">Launch: Mittwoch, 01. April • 18-20 Uhr</span>
                <span class="h-[1px] w-12 bg-zinc-800"></span>
            </div>
            
            <div class="flex flex-col sm:flex-row justify-center gap-6">
                <a href="https://discord.gg/mBKjReQXHR" target="_blank" class="btn btn-discord">
                    <i class="fab fa-discord mr-3"></i> Discord beitreten
                </a>
                <a href="#players" class="btn btn-outline">
                    Teilnehmer ansehen
                </a>
            </div>
        </div>
    </header>

    <section id="players" class="card-grid">
        <div class="search-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="SPIELER SUCHEN...">
            <i class="fas fa-search absolute right-6 top-1/2 -translate-y-1/2 text-zinc-700"></i>
        </div>

        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mt-12">
            <!-- Dynamisch -->
        </div>
    </section>

    <footer>
        Nicominecith SMP &copy; 2026 • Das Craft Attack Erlebnis
    </footer>

    <script>
        // Partikel Erzeugung
        const container = document.getElementById('particleContainer');
        for(let i=0; i<40; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 4 + 1;
            p.style.width = p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDelay = Math.random() * 15 + 's';
            p.style.animationDuration = (Math.random() * 10 + 10) + 's';
            container.appendChild(p);
        }

        const participants = [
            { name: "Nicominecith", type: "Projektleiter", twitch: "nicominecith_ttv" },
            { name: "jaime_zockt", type: "Creator", twitch: "jaime_zockt" },
            { name: "jeypiegc", type: "Creator", twitch: "jeypiegc" },
            { name: "BenX_LP", type: "Member" },
            { name: "XJonTendoX", type: "Creator", twitch: "XJonTendoX" },
            { name: "sebikaacat", type: "Creator", twitch: "sebikaacat" },
            { name: "der_fynn10", type: "Creator", twitch: "der_fynn10" },
            { name: "hektor_422", type: "Creator", twitch: "hektor_422" },
            { name: "RZ Lian", type: "Member" },
            { name: "Optimalst0rm", type: "Member" },
            { name: "Elias", type: "Member" },
            { name: "davidgamingtv", type: "Creator", twitch: "davidgamingtv" },
            { name: "monkey_3420", type: "Member" },
            { name: "palyoug", type: "Creator", twitch: "palyoug" },
            { name: "niebuco", type: "Creator", twitch: "niebuco" },
            { name: "Beacon", type: "Member" },
            { name: "fnkamikaze", type: "Creator", twitch: "fnkamikaze" },
            { name: "n1ghtdreams_", type: "Creator", twitch: "n1ghtdreams_" },
            { name: "whithhd", type: "Creator", twitch: "whithhd" },
            { name: "blaqqhd_", type: "Creator", twitch: "blaqqhd" }
        ];

        const grid = document.getElementById('grid');
        const searchInput = document.getElementById('searchInput');

        function render(filter = '') {
            grid.innerHTML = '';
            const filtered = participants.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));

            filtered.forEach(p => {
                const avatarUrl = `https://cravatar.eu/head/${p.name.split(' ')[0]}/256.png?overlay`;
                const card = document.createElement('div');
                card.className = 'player-card cursor-pointer';
                
                if (p.twitch) {
                    card.onclick = () => window.open(`https://twitch.tv/${p.twitch}`, '_blank');
                }

                card.innerHTML = `
                    ${p.twitch ? '<i class="fab fa-twitch absolute top-4 right-4 text-zinc-800"></i>' : ''}
                    <img src="${avatarUrl}" alt="${p.name}" class="skin-head" onerror="this.src='https://cravatar.eu/head/char/256.png'">
                    <div class="font-black text-lg tracking-tighter uppercase mb-1">${p.name}</div>
                    <div class="text-[10px] font-bold text-red-600 uppercase tracking-widest">${p.type}</div>
                `;
                grid.appendChild(card);
            });
        }

        searchInput.addEventListener('input', (e) => render(e.target.value));
        window.onload = () => render();
    </script>
</body>
</html>
